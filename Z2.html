<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZWHD</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1 class="neon-title">ZWHD</h1>

    <div class="card">
        <input type="file" id="mediaInput" class="input-box">
        <button class="main-btn" onclick="enhanceMedia()">Upload & Enhance</button>
    </div>

    <div id="previewArea" class="card hidden">
        <h2>Preview</h2>
        <img id="imagePreview" class="preview-image hidden">
        <video id="videoPreview" class="preview-video hidden" controls></video>

        <div class="button-group">
            <button class="main-btn">Download HD</button>
        </div>
    </div>

    <div class="notice">
        Untuk fitur real AI Enhance HD diperlukan backend FFmpeg / AI Upscaler.
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
