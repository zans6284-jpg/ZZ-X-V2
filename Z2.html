<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZWHD</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="title">ZWHD</div>

  <input type="file" id="file">

  <button onclick="uploadFile()">Download HD</button>

  <div class="card">
    <div class="info">
      Enhance foto, video, dan live photo dengan kualitas tinggi menggunakan FFmpeg tanpa kompres berlebih.
    </div>
  </div>
</div>

<script>
async function uploadFile(){
  const file = document.getElementById('file').files[0];

  const form = new FormData();
  form.append('file', file);

  const response = await fetch('/api/enhance',{
    method:'POST',
    body:form
  });

  const blob = await response.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'ZZ-HD-RESULT.mp4';
  a.click();
}
</script>
</body>
</html>
