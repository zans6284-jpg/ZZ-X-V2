<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tiktok Downloader</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="title">Tiktok Downloader</div>

  <input type="text" id="url" placeholder="Masukkan URL TikTok">

  <select id="quality">
    <option>420</option>
    <option>720</option>
    <option>1080</option>
    <option>1k</option>
  </select>

  <button onclick="loadData()">Ambil Data</button>

  <div class="card" id="result" style="display:none;">
    <img id="profile" class="profile">

    <div class="info">
      <div><b>Username:</b> <span id="username"></span></div>
      <div><b>Caption:</b> <span id="caption"></span></div>
      <div><b>Sound:</b> <span id="soundTitle"></span></div>
      <div><b>Media URL:</b> <span id="media"></span></div>
    </div>

    <div class="actions">
      <a id="downloadVideo" class="link-btn" download>Download No WM</a>
      <a id="downloadSound" class="link-btn" download>Download Sound</a>
    </div>
  </div>
</div>

<script>
async function loadData(){
  const url = document.getElementById('url').value;

  const req = await fetch('/api/tiktok',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({url})
  });

  const data = await req.json();

  document.getElementById('result').style.display='block';
  document.getElementById('profile').src=data.profile;
  document.getElementById('username').innerText=data.username;
  document.getElementById('caption').innerText=data.caption;
  document.getElementById('soundTitle').innerText=data.soundTitle;
  document.getElementById('media').innerText=data.media;

  document.getElementById('downloadVideo').href=data.media;
  document.getElementById('downloadSound').href=data.sound;
}
</script>
</body>
</html>
